# Runs on every push and pull request: install deps, lint, production build.
# Connect this repo to Vercel (see README) for automatic deploys on merge to main.

name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "timetable-optimizer/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "timetable-optimizer/frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: timetable-optimizer/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: timetable-optimizer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # CI build does not need a real API; placeholder satisfies Vite if you add stricter checks later
          VITE_API_BASE_URL: https://example.com
